name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'landguard-backend/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: landguard-backend/package-lock.json

      - name: Install dependencies
        working-directory: landguard-backend
        run: npm ci

      - name: Run tests
        working-directory: landguard-backend
        run: npm test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t landguard-backend:${{ github.sha }} \
            -t landguard-backend:latest \
            ./landguard-backend

      # Optional: Push to a container registry
      # Uncomment and configure the steps below to push the image.
