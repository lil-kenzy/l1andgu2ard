name: Backend CI/CD (legacy – see .github/workflows/ci.yml)

# This file is superseded by ci.yml which covers the full pipeline including
# Snyk, SonarQube, ECR push, and Kubernetes deploy.
# Kept here for branch-level PRs that only touch the backend.

on:
  push:
    branches:
      - main
    paths:
      - 'landguard-backend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'landguard-backend/**'

concurrency:
  group: backend-legacy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: landguard-backend/package-lock.json

      - name: Install dependencies
        working-directory: landguard-backend
        run: npm ci

      - name: Run tests
        working-directory: landguard-backend
        run: npm test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./landguard-backend
          push: false
          tags: |
            landguard-backend:${{ github.sha }}
            landguard-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

