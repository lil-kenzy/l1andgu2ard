apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landguard-ingress
  namespace: landguard
  annotations:
    # nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    # Force HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting: 100 req/s per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # Body size limit for document uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # TLS cert-manager (update issuer name for your cluster)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.landguard.gov.gh
        - landguard.gov.gh
      secretName: landguard-tls
  rules:
    # Backend API
    - host: api.landguard.gov.gh
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landguard-backend
                port:
                  name: http
    # Web dashboard
    - host: landguard.gov.gh
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landguard-web
                port:
                  number: 80
