apiVersion: apps/v1
kind: Deployment
metadata:
  name: landguard-backend
  namespace: landguard
  labels:
    app: landguard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landguard-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: landguard-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      # Ensure pods are spread across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: landguard-backend

      containers:
        - name: backend
          # Image is updated by the CI/CD pipeline (see .github/workflows/ci.yml)
          image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http

          envFrom:
            - configMapRef:
                name: landguard-backend-config
            - secretRef:
                name: landguard-backend-secrets

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Graceful shutdown: allow in-flight requests to finish
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 60
