# Prometheus scrape configuration for LandGuard
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: landguard

# ── Alertmanager (configure separately) ─────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Scrape jobs ──────────────────────────────────────────────────────────────
scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # LandGuard backend – exposes /metrics via prom-client (add if desired)
  - job_name: landguard-backend
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:5000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # MongoDB exporter (optional – deploy mongodb-exporter sidecar)
  - job_name: mongodb
    static_configs:
      - targets: ['mongo:9216']

  # Redis exporter (optional – deploy redis-exporter sidecar)
  - job_name: redis
    static_configs:
      - targets: ['redis:9121']

  # Node exporter for host metrics (deploy on each EC2 instance)
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
